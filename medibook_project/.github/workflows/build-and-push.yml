name: Build and Push Docker image

on:
  push:
    branches: ["main", "master"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub (optional)
        if: secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image to registries
        uses: docker/build-push-action@v4
        with:
          context: ./
          file: ./medibook_project/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME && format('docker.io/{0}/medibook:latest', secrets.DOCKERHUB_USERNAME) || '' }}
            ${{ secrets.DOCKERHUB_USERNAME && format('docker.io/{0}/medibook:{1}', secrets.DOCKERHUB_USERNAME, github.sha) || '' }}
